eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0

  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false

spring:
  rabbitmq:
    template:
      observation-enabled: true
    listener:
      simple:
        observation-enabled: true

logging:
  pattern:
    level: "%5p"
    correlation: "[%X{traceId:-}] [%X{spanId:-}]"